{% extends 'base.html' %}
{% block content %}
<h2 class="mb-0"><strong>Report Directory</strong></h2>
<br>
<div class="d-flex justify-content-between align-items-center mt-3">
    <a href="{% url 'select_team_report' %}" class="btn btn-primary">
        <i>Generate Report +</i>
    </a>
    <form method="GET" class="d-flex">
        <div class="input-group" style="width: 300px;">
            <input type="text" name="search" class="form-control" placeholder="🔍 Search Through Reports...">
            <button class="btn btn-primary" type="submit">GO</button>
        </div>
    </form>
</div>
<br>
<div class="card shadow-sm">
    <div class="card-body">

        <table class="table table-hover">

            <thead class="table-light">
                <tr>
                    <th>REPORT NAME</th>
                    <th>CREATED BY</th>
                    <th style="width: 15%;">VIEW REPORT</th>
                </tr>
            </thead>
 <tbody>
    
        {% for report in reports %}
        <tr>
            <td>{{ report.name }}</td>
            <td></td>
            <td><a href="{{ report.file.url}}" class="btn btn-primary" target="_blank">
                View Report
            </a></td>
        </tr>
        {% endfor %}
    </tbody>
        </table>
    </div>
</div>

{% endblock %}
