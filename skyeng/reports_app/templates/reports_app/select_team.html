{% extends 'base.html' %}
{% block content %}
<h2 class="mb-0"><strong>Select Team</strong></h2>
<p><i>Select a Team to generate a report on.</i></p>
<br>

<form method="post">
    {% csrf_token %}
<div class ="d-flex align-items-center gap-2">
    <select name="team_id" class="form-select rounded-pill" style="width: 125px;">
        {% for team in teams %}
            <option value="{{ team.id }}">{{ team.name }}</option>
        {% endfor %}
    </select>

    <button class="btn btn-primary" type="submit">GENERATE</button>
</form>
</div>
{% endblock %}
