{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SkyEng</title>
    <!-- Shared stylesheet – all teammates include this one line -->
    <link rel="stylesheet" href="{% static 'skyeng.css' %}">
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
    <div class="logo-container">
        <img src="{% static 'images/skyLogo.png' %}" alt="sky logo" class="logo-img" >
    </div>
    <!-- <span class="logo">SkyEng</span> -->
    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="{% url 'teams' %}" class="{% if request.resolver_match.url_name == 'teams' %}active{% endif %}">Teams</a>
    <a href="#">Organisation</a>
    <a href="#">Messages</a>
    <a href="{% url 'schedule' %}" class="{% if request.resolver_match.url_name == 'schedule' %}active{% endif %}">Schedule</a>
    <a href="#">Reports</a>
</div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <span class="section-label">Main Menu</span>
        <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">🏠 Dashboard</a>
        <a href="{% url 'teams' %}" class="{% if request.resolver_match.url_name == 'teams' %}active{% endif %}">👥 Teams</a>
        <a href="#">🏫 Organisation</a>
        <a href="#">✉️ Messages</a>
        <a href="{% url 'schedule' %}">📅 Schedule</a>
        <a href="#">📊 Reports</a>
        <span class="section-label">Account</span>
        <a href="#">👤 My Profile</a>
        <a href="#">🔒 Log Out</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        {% block content%}

        {% endblock %}
        

        <!-- add your content here -->

    </div>

</div>

</body>
</html>
